<script id="logic">
'use strict';
// Pure, DOM-free L-system math — extracted and unit-tested in Node via
// experiments/_harness/logic.mjs (see docs/l-system-atelier/plan.md).
// IIFE so only __logic reaches the shared global scope.
(() => {

// expand: n parallel derivations. Every pass rewrites all symbols at once;
// symbols without a rule copy through unchanged.
function expand(axiom, rules, n) {
  let s = axiom;
  for (let i = 0; i < n; i++) {
    let out = '';
    for (const ch of s) out += rules[ch] ?? ch;
    s = out;
  }
  return s;
}

// interpret: turtle walk. F draws, f moves, +/- turn by `angle` degrees,
// [ pushes state, ] pops; everything else is silent. Starts at (0,0)
// heading up (screen coords). Returns segments {x1,y1,x2,y2,depth} and the
// tight bounding box of all endpoints. Pure trig, no canvas.
function interpret(s, { angle, step }) {
  const rad = angle * Math.PI / 180;
  let x = 0, y = 0, h = -Math.PI / 2, depth = 0;
  const stack = [];
  const segments = [];
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const see = (px, py) => {
    if (px < minX) minX = px; if (px > maxX) maxX = px;
    if (py < minY) minY = py; if (py > maxY) maxY = py;
  };
  for (const ch of s) {
    if (ch === 'F') {
      const nx = x + Math.cos(h) * step, ny = y + Math.sin(h) * step;
      segments.push({ x1: x, y1: y, x2: nx, y2: ny, depth });
      see(x, y); see(nx, ny);
      x = nx; y = ny;
    } else if (ch === 'f') {
      x += Math.cos(h) * step; y += Math.sin(h) * step;
    } else if (ch === '+') {
      h -= rad;
    } else if (ch === '-') {
      h += rad;
    } else if (ch === '[') {
      stack.push({ x, y, h });
      depth++;
    } else if (ch === ']') {
      const t = stack.pop();
      if (t) { x = t.x; y = t.y; h = t.h; depth--; }
    }
    // other symbols: silent growth markers
  }
  return { segments, bounds: { minX, minY, maxX, maxY } };
}

// brackets balanced: counter never dips below zero, ends at zero
function balanced(s) {
  let d = 0;
  for (const ch of s) {
    if (ch === '[') d++;
    else if (ch === ']' && --d < 0) return false;
  }
  return d === 0;
}

// validate: null when the system is safe to derive, otherwise a gentle
// error string. Budgets are checked by counting symbols per derivation
// (no string is ever built), so runaway systems abort cheaply. The budget
// that matters is drawn segments (F count, capped at maxSegments); total
// symbols get a generous safety cap so silent-symbol blowups abort too.
function validate(axiom, rules, n, maxSegments = 60000) {
  const maxSymbols = Math.max(maxSegments * 16, 1e6);
  if (!axiom || !axiom.trim()) return 'the axiom is empty';
  if (!balanced(axiom)) return 'unbalanced brackets in the axiom';
  for (const [k, v] of Object.entries(rules)) {
    if (!balanced(v)) return `unbalanced brackets in the ${k} rule`;
  }
  let counts = {};
  for (const ch of axiom) counts[ch] = (counts[ch] || 0) + 1;
  for (let i = 0; i < n; i++) {
    const next = {};
    let total = 0;
    for (const [sym, c] of Object.entries(counts)) {
      for (const ch of rules[sym] ?? sym) {
        next[ch] = (next[ch] || 0) + c;
      }
    }
    for (const c of Object.values(next)) total += c;
    if ((next.F || 0) > maxSegments) return `derivation explodes past ${maxSegments.toLocaleString()} segments at pass ${i + 1}`;
    if (total > maxSymbols) return `derivation explodes past ${maxSymbols.toLocaleString()} symbols at pass ${i + 1}`;
    counts = next;
  }
  return null;
}

// mutate: one structural perturbation — flip a turn sign, or duplicate a
// bracketed branch clause. Never touches the input; rng in [0,1).
function mutate(rules, rng) {
  const keys = Object.keys(rules);
  const candidates = [];
  for (const k of keys) {
    const v = rules[k];
    for (let i = 0; i < v.length; i++) {
      const ch = v[i];
      if (ch === '+' || ch === '-') {
        candidates.push({ k, apply: s => s.slice(0, i) + (ch === '+' ? '-' : '+') + s.slice(i + 1) });
      } else if (ch === '[') {
        // find the matching ] and duplicate the whole clause
        let d = 0;
        for (let j = i; j < v.length; j++) {
          if (v[j] === '[') d++;
          else if (v[j] === ']' && --d === 0) {
            const clause = v.slice(i, j + 1);
            candidates.push({ k, apply: s => s.slice(0, j + 1) + clause + s.slice(j + 1) });
            break;
          }
        }
      }
    }
  }
  const out = { ...rules };
  if (!candidates.length) {
    // featureless rules: graft a small branch onto the first rule
    const k = keys[0];
    if (k !== undefined) out[k] = rules[k] + '[+F]';
    return out;
  }
  const pick = candidates[Math.floor(rng() * candidates.length) % candidates.length];
  out[pick.k] = pick.apply(rules[pick.k]);
  return out;
}

// Six shipped systems. Iteration counts are tuned so every preset lands
// well under the 60k-segment budget (see tests).
const PRESETS = {
  Fern:      { axiom: 'X',       rules: { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' }, angle: 25,   iterations: 7 },
  Weed:      { axiom: 'F',       rules: { F: 'F[+F]F[-F]F' },                 angle: 22.5, iterations: 5 },
  Bush:      { axiom: 'F',       rules: { F: 'FF+[+F-F-F]-[-F+F+F]' },        angle: 22.5, iterations: 4 },
  Snowflake: { axiom: 'F--F--F', rules: { F: 'F+F--F+F' },                    angle: 60,   iterations: 5 },
  Dragon:    { axiom: 'FX',      rules: { X: 'X+YF+', Y: '-FX-Y' },           angle: 90,   iterations: 13 },
  Sparse:    { axiom: 'X',       rules: { X: 'F[+X][-X]FX', F: 'FF' },        angle: 25.7, iterations: 7 },
};

globalThis.__logic = { expand, interpret, validate, mutate, PRESETS };
})();
</script>
<script>
'use strict';
const { expand, interpret, validate, mutate, PRESETS } = globalThis.__logic;

const TAU = Math.PI * 2;
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lerp = (a, b, t) => a + (b - a) * t;
const easeInOut = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

// ---------- canvas layers ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const plantCanvas = document.createElement('canvas');   // persistent strokes
const pctx = plantCanvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

// ---------- starfield ----------
let stars = [];
function makeStars() {
  stars = [];
  const n = Math.floor(W * H / 9000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: 0.3 + Math.random() * 1.1,
      tw: 0.5 + Math.random() * 2, ph: Math.random() * TAU,
    });
  }
}

// ---------- plant state ----------
// anim: the current derivation laid out for the screen, mid-replay.
let anim = null;            // { segs, total, drawn, t0, dur, maxDepth, layout }
let lastGood = null;        // last system that derived cleanly (panel state)
let prevSystem = null;      // one-level undo for mutate

function layoutFor(bounds) {
  const bw = Math.max(bounds.maxX - bounds.minX, 1e-6);
  const bh = Math.max(bounds.maxY - bounds.minY, 1e-6);
  // stage sits a touch right of center so the rule panel never crowds the plant
  const scale = Math.min((W * 0.72) / bw, (H * 0.82) / bh, 60);
  return {
    scale,
    ox: W * 0.56 - (bounds.minX + bounds.maxX) / 2 * scale,
    oy: H * 0.5 - (bounds.minY + bounds.maxY) / 2 * scale,
  };
}

// depth ramp: dim deep teal at the root → luminous teal mid-canopy →
// bright amber at the deepest tips. RGB stops keep the midtones soft.
// Bracketless systems (Dragon, Snowflake) ramp along the path instead.
const RAMP = [
  [26, 102, 96],    // root: deep sea teal, dim
  [70, 226, 199],   // mid: luminous teal
  [255, 196, 110],  // tips: warm amber
];
function segStyle(seg, i, anim) {
  // rampMax is a high percentile of depth, not the absolute max, so the
  // outer canopy actually reaches amber instead of hoarding it in a few tips
  const t = anim.rampMax > 0
    ? clamp(seg.depth / anim.rampMax, 0, 1)
    : i / Math.max(anim.total - 1, 1);
  const u = t < 0.5 ? t * 2 : t * 2 - 1;
  const [a, b] = t < 0.5 ? [RAMP[0], RAMP[1]] : [RAMP[1], RAMP[2]];
  const r = lerp(a[0], b[0], u) | 0, g = lerp(a[1], b[1], u) | 0, bl = lerp(a[2], b[2], u) | 0;
  const alpha = lerp(0.55, 0.95, t);
  return {
    color: `rgba(${r},${g},${bl},${alpha.toFixed(2)})`,
    width: lerp(2.6, 0.7, t),
  };
}

// stroke segments [a, b) onto the persistent plant layer
function drawSegRange(a, b) {
  const { scale, ox, oy } = anim.layout;
  pctx.lineCap = 'round';
  let prevColor = null, prevWidth = -1;
  for (let i = a; i < b; i++) {
    const s = anim.segs[i];
    const st = segStyle(s, i, anim);
    if (st.color !== prevColor || st.width !== prevWidth) {
      pctx.strokeStyle = st.color;
      pctx.lineWidth = st.width;
      pctx.shadowColor = st.color;
      pctx.shadowBlur = 6;
      prevColor = st.color; prevWidth = st.width;
    }
    pctx.beginPath();
    pctx.moveTo(s.x1 * scale + ox, s.y1 * scale + oy);
    pctx.lineTo(s.x2 * scale + ox, s.y2 * scale + oy);
    pctx.stroke();
  }
  pctx.shadowBlur = 0;
}

function clearPlantLayer() {
  pctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  pctx.clearRect(0, 0, W, H);
}

// growth duration scales gently with complexity: small systems snap,
// the fern unfurls over ~4.5 s
function growDuration(n) { return clamp(1.4 + n / 7000, 1.8, 4.6); }

function startReplay(segs, bounds, rampMax) {
  anim = {
    segs, total: segs.length, drawn: 0,
    t0: performance.now() / 1000,
    dur: growDuration(segs.length),
    rampMax,
    layout: layoutFor(bounds),
    bounds,
  };
  clearPlantLayer();
}

// ---------- panel ----------
const $ = id => document.getElementById(id);
const axiomEl = $('axiom');
const ruleRows = [...document.querySelectorAll('.rule')].map(r => ({
  sym: r.querySelector('.sym'), rep: r.querySelector('.rep'),
}));
const angleEl = $('angle'), angleValEl = $('angleVal');
const iterValEl = $('iterVal');
const errorEl = $('error'), diffEl = $('diff'), statusEl = $('status');
const mutateBtn = $('mutate'), backBtn = $('back');
const chipsEl = $('chips');

let iterations = 1;
let activeChip = null;

for (const name of Object.keys(PRESETS)) {
  const b = document.createElement('button');
  b.className = 'chip';
  b.textContent = name.toLowerCase();
  b.dataset.name = name;
  b.addEventListener('click', () => loadPreset(name));
  chipsEl.appendChild(b);
}

function setActiveChip(name) {
  activeChip = name;
  for (const b of chipsEl.children) b.classList.toggle('active', b.dataset.name === name);
}

function readPanel() {
  const rules = {};
  for (const r of ruleRows) {
    const k = r.sym.value.trim();
    if (k) rules[k] = r.rep.value.trim();
  }
  return {
    axiom: axiomEl.value.trim(),
    rules,
    angle: parseFloat(angleEl.value),
    iterations,
  };
}

function writePanel(sys) {
  axiomEl.value = sys.axiom;
  const entries = Object.entries(sys.rules);
  ruleRows.forEach((r, i) => {
    r.sym.value = entries[i] ? entries[i][0] : '';
    r.rep.value = entries[i] ? entries[i][1] : '';
  });
  angleEl.value = sys.angle;
  angleValEl.textContent = `${sys.angle}°`;
  iterations = sys.iterations;
  iterValEl.textContent = iterations;
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = msg ? 'block' : 'none';
}

const escHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

// minimal prefix/suffix diff of the one mutated rule, highlighted
function showDiff(oldRules, newRules) {
  let html = '';
  for (const k of Object.keys(newRules)) {
    const a = oldRules[k] ?? '', b = newRules[k];
    if (a === b) continue;
    let p = 0;
    while (p < a.length && p < b.length && a[p] === b[p]) p++;
    let q = 0;
    while (q < a.length - p && q < b.length - p && a[a.length - 1 - q] === b[b.length - 1 - q]) q++;
    const mid = s => `${escHtml(s.slice(0, p))}<span class="MARK">${escHtml(s.slice(p, s.length - q))}</span>${escHtml(s.slice(s.length - q))}`;
    html += `${escHtml(k)}: ${mid(a).replace('MARK', 'old')} &rarr; ${mid(b).replace('MARK', 'new')}<br>`;
  }
  diffEl.innerHTML = html;
  diffEl.style.display = html ? 'block' : 'none';
}

// ---------- derive ----------
function derive() {
  const sys = readPanel();
  const err = validate(sys.axiom, sys.rules, sys.iterations);
  if (err) { showError(err); return; }       // canvas keeps the last good plant
  let segs, bounds;
  try {
    const s = expand(sys.axiom, sys.rules, sys.iterations);
    ({ segments: segs, bounds } = interpret(s, { angle: sys.angle, step: 5 }));
  } catch (e) {
    showError('that grammar would not grow');
    return;
  }
  if (!segs.length) { showError('nothing to draw — no F in the derivation'); return; }
  showError(null);
  lastGood = sys;
  // rampMax = 85th-percentile depth (0 means: ramp along the path instead)
  const depths = segs.map(g => g.depth).sort((a, b) => a - b);
  const rampMax = depths[depths.length - 1] > 0
    ? Math.max(1, depths[Math.floor(depths.length * 0.85)])
    : 0;
  startReplay(segs, bounds, rampMax);
  statusEl.textContent = `${segs.length.toLocaleString()} segments · ${anim.dur.toFixed(1)}s grow`;
}

let deriveTimer = null;
const scheduleDerive = (ms = 280) => { clearTimeout(deriveTimer); deriveTimer = setTimeout(derive, ms); };

function loadPreset(name) {
  writePanel(PRESETS[name]);
  setActiveChip(name);
  diffEl.style.display = 'none';
  derive();
}

// typed edits: debounce, drop the chip highlight, clear stale diff
for (const el of [axiomEl, ...ruleRows.flatMap(r => [r.sym, r.rep])]) {
  el.addEventListener('input', () => { setActiveChip(null); diffEl.style.display = 'none'; scheduleDerive(); });
}
angleEl.addEventListener('input', () => {
  angleValEl.textContent = `${parseFloat(angleEl.value)}°`;
  setActiveChip(null);
  scheduleDerive(60);          // near-instant crystalline rederive
});
$('iterUp').addEventListener('click', () => {
  iterations = Math.min(iterations + 1, 16);
  iterValEl.textContent = iterations;
  setActiveChip(null); derive();
});
$('iterDown').addEventListener('click', () => {
  iterations = Math.max(iterations - 1, 0);
  iterValEl.textContent = iterations;
  setActiveChip(null); derive();
});

mutateBtn.addEventListener('click', () => {
  const base = lastGood ?? readPanel();
  prevSystem = { ...base, rules: { ...base.rules } };
  backBtn.disabled = false;
  // try a few times in case a mutation explodes past the budget
  for (let tries = 0; tries < 8; tries++) {
    const newRules = mutate(base.rules, Math.random);
    if (validate(base.axiom, newRules, base.iterations) === null) {
      writePanel({ ...base, rules: newRules });
      setActiveChip(null);
      showDiff(base.rules, newRules);
      derive();
      return;
    }
  }
  showError('every mutation exploded — try fewer iterations');
});

backBtn.addEventListener('click', () => {
  if (!prevSystem) return;
  writePanel(prevSystem);
  prevSystem = null;
  backBtn.disabled = true;
  setActiveChip(null);
  diffEl.style.display = 'none';
  derive();
});

// ---------- toast & keys ----------
const toastEl = $('toast');
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.style.opacity = 0, 1800);
}

window.addEventListener('keydown', e => {
  if (e.target.closest('input')) return;      // typing in the panel
  if (e.key === 's') {
    const a = document.createElement('a');
    a.download = 'l-system-atelier.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    toast('image saved');
  }
});

// ---------- resize ----------
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  for (const [cv, cx] of [[canvas, ctx], [plantCanvas, pctx]]) {
    cv.width = W * DPR; cv.height = H * DPR;
    cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  makeStars();
  if (anim) {                       // re-fit and redraw what has grown so far
    anim.layout = layoutFor(anim.bounds);
    clearPlantLayer();
    drawSegRange(0, anim.drawn);
  }
}
window.addEventListener('resize', resize);

// ---------- main loop ----------
function frame(ms) {
  const now = ms / 1000;

  // night sky
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#020108');
  sky.addColorStop(0.55, '#0a0f2c');
  sky.addColorStop(1, '#04060f');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  for (const s of stars) {
    const tw = 0.3 + 0.7 * ((Math.sin(now * s.tw + s.ph) + 1) / 2);
    ctx.globalAlpha = tw * 0.8;
    ctx.fillStyle = '#dfe6ff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (anim) {
    const f = clamp((now - anim.t0) / anim.dur, 0, 1);
    const target = Math.floor(easeInOut(f) * anim.total);
    if (target > anim.drawn) {
      drawSegRange(anim.drawn, target);
      anim.drawn = target;
    }
    ctx.drawImage(plantCanvas, 0, 0, W, H);

    if (anim.drawn >= anim.total) {
      // finished: the whole plant breathes light
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.07 + 0.05 * Math.sin(now * 1.4);
      ctx.drawImage(plantCanvas, 0, 0, W, H);
      ctx.restore();
    } else {
      // growth fire: bright embers riding the newest tips
      const { scale, ox, oy } = anim.layout;
      const from = Math.max(0, anim.drawn - 26);
      for (let i = from; i < anim.drawn; i++) {
        const s = anim.segs[i];
        const a = (i - from + 1) / (anim.drawn - from + 1);
        ctx.globalAlpha = a * 0.9;
        ctx.fillStyle = '#eafff7';
        ctx.shadowColor = '#7dffd9';
        ctx.shadowBlur = 9;
        ctx.beginPath();
        ctx.arc(s.x2 * scale + ox, s.y2 * scale + oy, 1.3, 0, TAU);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  // soft vignette to pool the light center-stage
  const vig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.42, W / 2, H / 2, Math.max(W, H) * 0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(1,1,8,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(frame);
}

resize();
loadPreset('Fern');
requestAnimationFrame(frame);
</script>
</body>
