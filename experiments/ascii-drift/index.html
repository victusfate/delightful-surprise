<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ascii-drift — a world of text</title>
</head>
<body>
<script id="logic">
'use strict';
// Pure, DOM-free world math — extracted and unit-tested in Node via
// experiments/_harness/logic.mjs (see docs/ascii-drift/plan.md).
// IIFE so only __logic reaches the shared global scope.
(() => {

// mulberry32 — tiny seeded PRNG, values in [0,1)
function mulberry(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// hash integer lattice point (+ seed) to [0,1) — one mulberry draw
function latticeHash(seed, ix, iy) {
  const h = (Math.imul(ix, 374761393) + Math.imul(iy, 668265263) + Math.imul(seed | 0, 1442695041)) >>> 0;
  return mulberry(h)();
}

const smooth = t => t * t * (3 - 2 * t); // smoothstep
const lerp = (a, b, t) => a + (b - a) * t;

// seeded 2D value noise in [0,1]
function makeNoise(seed) {
  return (x, y) => {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const a = latticeHash(seed, ix, iy);
    const b = latticeHash(seed, ix + 1, iy);
    const c = latticeHash(seed, ix, iy + 1);
    const d = latticeHash(seed, ix + 1, iy + 1);
    const u = smooth(fx), v = smooth(fy);
    return lerp(lerp(a, b, u), lerp(c, d, u), v);
  };
}

// fractal Brownian motion, normalized to [0,1]
function fbm(noise, x, y, octaves) {
  let sum = 0, amp = 1, freqMul = 1, norm = 0;
  for (let o = 0; o < octaves; o++) {
    sum += noise(x * freqMul, y * freqMul) * amp;
    norm += amp;
    amp *= 0.5;
    freqMul *= 2;
  }
  return sum / norm;
}

// ---------- biomes ----------
// Height bands (world-stable thresholds); the 0.45–0.62 mid band is split
// by moisture into plains (< 0.33), grass (< 0.66), forest (>= 0.66).
//   deep-sea  [0.00, 0.28)
//   sea       [0.28, 0.40)
//   shore     [0.40, 0.45)
//   mid band  [0.45, 0.62)
//   hills     [0.62, 0.75)
//   mountains [0.75, 0.88)
//   snow      [0.88, 1.00]
const BIOMES = {
  'deep-sea':  { id: 'deep-sea',  name: 'Deep Sea',  band: [0.00, 0.28], chars: [' ', '~', '~'],  color: '#27598f', suffixes: ['Deep', 'Abyss', 'Trench'] },
  'sea':       { id: 'sea',       name: 'Sea',       band: [0.28, 0.40], chars: ['~', '~', '≈'],  color: '#3f86b8', suffixes: ['Sea', 'Gulf', 'Sound', 'Expanse'] },
  'shore':     { id: 'shore',     name: 'Shore',     band: [0.40, 0.45], chars: [':', '∴'],       color: '#a89868', suffixes: ['Strand', 'Coast', 'Shoals'] },
  'plains':    { id: 'plains',    name: 'Plains',    band: [0.45, 0.62], chars: ['.', ','],       color: '#9aa05f', suffixes: ['Steppe', 'Plain', 'Flats'] },
  'grass':     { id: 'grass',     name: 'Grassland', band: [0.45, 0.62], chars: [',', '"'],       color: '#5fae6e', suffixes: ['Meadows', 'Fields', 'Veldt'] },
  'forest':    { id: 'forest',    name: 'Forest',    band: [0.45, 0.62], chars: ['♣', '♣', '♠'],  color: '#2e9678', suffixes: ['Forest', 'Wood', 'Thicket'] },
  'hills':     { id: 'hills',     name: 'Hills',     band: [0.62, 0.75], chars: ['n', '∩'],       color: '#a78d5f', suffixes: ['Hills', 'Downs', 'Barrows'] },
  'mountains': { id: 'mountains', name: 'Mountains', band: [0.75, 0.88], chars: ['^', '▲'],       color: '#b3aca8', suffixes: ['Peaks', 'Range', 'Crags'] },
  'snow':      { id: 'snow',      name: 'Snow',      band: [0.88, 1.00], chars: ['*', '❄'],       color: '#cfc4f0', suffixes: ['Wastes', 'Snowfield', 'Glacier'] },
};

function biomeFor(h, m) {
  if (h < 0.28) return 'deep-sea';
  if (h < 0.40) return 'sea';
  if (h < 0.45) return 'shore';
  if (h < 0.62) return m < 0.33 ? 'plains' : m < 0.66 ? 'grass' : 'forest';
  if (h < 0.75) return 'hills';
  if (h < 0.88) return 'mountains';
  return 'snow';
}

const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;

// character from the biome's ramp by height fraction within its band —
// deterministic, no rng in the render path.
function charFor(biome, h) {
  const { band, chars } = BIOMES[biome];
  const f = clamp01((h - band[0]) / (band[1] - band[0]));
  return chars[Math.min(chars.length - 1, Math.floor(f * chars.length))];
}

globalThis.__logic = { mulberry, makeNoise, fbm, BIOMES, biomeFor, charFor };
})();
</script>
</body>
</html>
