<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>boid lagoon — a midnight aquarium</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #010608; }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed; inset: 0; pointer-events: none;
    font-family: Georgia, 'Times New Roman', serif; color: #bfece8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; transition: opacity 2.5s ease; text-shadow: 0 0 18px rgba(80,220,200,.5);
  }
  #ui h1 { font-size: 2.6rem; font-weight: normal; letter-spacing: .35em; margin: 0 0 .6rem; opacity: .92; }
  #ui p { font-size: 1rem; letter-spacing: .12em; opacity: .65; margin: .25rem 0; }
  #ui.hidden { opacity: 0; }
  #hint {
    position: fixed; bottom: 14px; right: 18px; pointer-events: none;
    font-family: Georgia, serif; font-size: .78rem; letter-spacing: .1em;
    color: rgba(150,220,210,.45);
  }
  #toast {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    pointer-events: none; font-family: Georgia, serif; font-size: .9rem;
    letter-spacing: .15em; color: rgba(190,240,230,.85);
    text-shadow: 0 0 14px rgba(80,220,200,.6); opacity: 0; transition: opacity .6s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>boid lagoon</h1>
  <p>hold to scatter food &mdash; the school will break to feed</p>
  <p>tap open water and something hungrier arrives</p>
</div>
<div id="hint">[m]ute &nbsp; [+/-] school size</div>
<div id="toast"></div>

<script id="logic">
'use strict';
// Pure, DOM-free boid math — extracted and unit-tested in Node via
// experiments/_harness/logic.mjs (see docs/boid-lagoon/plan.md).
// IIFE so only __logic reaches the shared global scope.
(() => {

// Scale v down to magnitude `max` if it is longer; never scales up.
function limit(v, max) {
  const m = Math.hypot(v.x, v.y);
  if (m <= max || m === 0) return { x: v.x, y: v.y };
  const k = max / m;
  return { x: v.x * k, y: v.y * k };
}

// Clamp speed to [min, max], preserving direction. The zero vector gets a
// deterministic fallback heading at min speed — fish never stall.
function clampSpeed(v, min, max) {
  const m = Math.hypot(v.x, v.y);
  if (m === 0) return { x: min, y: 0 };
  const k = m > max ? max / m : m < min ? min / m : 1;
  return { x: v.x * k, y: v.y * k };
}

// Steer away from neighbors, weighted by inverse distance — the closer the
// neighbor, the harder the push.
function separation(b, neighbors) {
  let x = 0, y = 0;
  for (const n of neighbors) {
    const dx = b.x - n.x, dy = b.y - n.y;
    const d = Math.hypot(dx, dy);
    if (d === 0) continue;
    x += dx / (d * d);
    y += dy / (d * d);
  }
  return { x, y };
}

// Steer toward the neighbors' average velocity (heading).
function alignment(b, neighbors) {
  if (neighbors.length === 0) return { x: 0, y: 0 };
  let vx = 0, vy = 0;
  for (const n of neighbors) { vx += n.vx; vy += n.vy; }
  vx /= neighbors.length; vy /= neighbors.length;
  return { x: vx - b.vx, y: vy - b.vy };
}

// Steer toward the neighbors' centroid.
function cohesion(b, neighbors) {
  if (neighbors.length === 0) return { x: 0, y: 0 };
  let cx = 0, cy = 0;
  for (const n of neighbors) { cx += n.x; cy += n.y; }
  cx /= neighbors.length; cy /= neighbors.length;
  return { x: cx - b.x, y: cy - b.y };
}

// Zero outside `radius`; inside, an away-vector whose strength grows as the
// threat closes (linear-in-proximity panic over inverse distance).
function flee(b, threat, radius) {
  const dx = b.x - threat.x, dy = b.y - threat.y;
  const d = Math.hypot(dx, dy);
  if (d >= radius || d === 0) return { x: 0, y: 0 };
  const k = (radius - d) / radius / d; // normalize away-vector, scale by proximity
  return { x: dx * k, y: dy * k };
}

// Default tuning, shared by the app and the unit tests. Units: px, px/s.
const WEIGHTS = {
  separation: 2600,
  alignment: 1.6,
  cohesion: 1.1,
  seek: 130,
  flee: 9000,
  curiosity: 14,
  wall: 320,
  maxForce: 260,
  minSpeed: 28,
  maxSpeed: 130,
  neighborRadius: 70,
  fleeRadius: 150,
  seekRadius: 220,
  wallMargin: 70,
};

// One simulation tick. Pure: returns a new boid, never mutates the input.
// env = { food: [{x,y}], predator: {x,y} | null, pointer?: {x,y}, bounds: {w,h} }.
function stepBoid(b, neighbors, env, w, dt) {
  const sep = separation(b, neighbors);
  const ali = alignment(b, neighbors);
  const coh = cohesion(b, neighbors);
  let ax = sep.x * w.separation + ali.x * w.alignment + coh.x * w.cohesion;
  let ay = sep.y * w.separation + ali.y * w.alignment + coh.y * w.cohesion;

  // seek the nearest food mote within seekRadius
  if (env.food && env.food.length) {
    let best = null, bestD = w.seekRadius;
    for (const f of env.food) {
      const d = Math.hypot(f.x - b.x, f.y - b.y);
      if (d < bestD) { bestD = d; best = f; }
    }
    if (best && bestD > 0) {
      ax += ((best.x - b.x) / bestD) * w.seek;
      ay += ((best.y - b.y) / bestD) * w.seek;
    }
  }

  // gentle curiosity about the pointer
  if (env.pointer) {
    const dx = env.pointer.x - b.x, dy = env.pointer.y - b.y;
    const d = Math.hypot(dx, dy);
    if (d > 1) { ax += (dx / d) * w.curiosity; ay += (dy / d) * w.curiosity; }
  }

  // behavioral forces are capped; panic and walls are not
  const acc = limit({ x: ax, y: ay }, w.maxForce);
  ax = acc.x; ay = acc.y;

  if (env.predator) {
    const f = flee(b, env.predator, w.fleeRadius);
    ax += f.x * w.flee;
    ay += f.y * w.flee;
  }

  // soft wall repulsion, ramping up inside wallMargin
  const m = w.wallMargin, bw = env.bounds.w, bh = env.bounds.h;
  if (b.x < m) ax += w.wall * (1 - b.x / m);
  if (b.x > bw - m) ax -= w.wall * (1 - (bw - b.x) / m);
  if (b.y < m) ay += w.wall * (1 - b.y / m);
  if (b.y > bh - m) ay -= w.wall * (1 - (bh - b.y) / m);

  let v = clampSpeed({ x: b.vx + ax * dt, y: b.vy + ay * dt }, w.minSpeed, w.maxSpeed);
  let x = b.x + v.x * dt, y = b.y + v.y * dt;

  // hard backstop: the lagoon has glass — clamp and reflect, never escape
  const inset = 2;
  if (x < inset) { x = inset; v = { x: Math.abs(v.x), y: v.y }; }
  if (x > bw - inset) { x = bw - inset; v = { x: -Math.abs(v.x), y: v.y }; }
  if (y < inset) { y = inset; v = { x: v.x, y: Math.abs(v.y) }; }
  if (y > bh - inset) { y = bh - inset; v = { x: v.x, y: -Math.abs(v.y) }; }

  const speed = Math.hypot(v.x, v.y);
  return {
    x, y, vx: v.x, vy: v.y, hue: b.hue,
    wiggle: b.wiggle + dt * (6 + speed * 0.09),
  };
}

globalThis.__logic = {
  limit, clampSpeed, separation, alignment, cohesion, flee, stepBoid, WEIGHTS,
};
})();
</script>
<script>
'use strict';
const { clampSpeed, limit, stepBoid, WEIGHTS } = globalThis.__logic;

// ---------- tiny utils ----------
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));

// ---------- canvas ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  makeRays();
}
window.addEventListener('resize', resize);

// ---------- the school ----------
let school = [];
function spawnFish(n) {
  const cx = rand(W * 0.3, W * 0.7), cy = rand(H * 0.35, H * 0.65);
  for (let i = 0; i < n; i++) {
    const ang = rand(0, TAU);
    school.push({
      x: clamp(cx + rand(-90, 90), 30, W - 30),
      y: clamp(cy + rand(-70, 70), 30, H - 30),
      vx: Math.cos(ang) * rand(WEIGHTS.minSpeed, WEIGHTS.maxSpeed * 0.6),
      vy: Math.sin(ang) * rand(WEIGHTS.minSpeed, WEIGHTS.maxSpeed * 0.6),
      hue: rand(160, 205),
      wiggle: rand(0, TAU),
    });
  }
}
function setSchoolSize(n) {
  n = clamp(n, 20, 120);
  if (n > school.length) spawnFish(n - school.length);
  else school.length = n;
  toast(`${school.length} fish`);
}

// ---------- food ----------
const food = []; // {x, y, vy, drift, born}
let holding = false, holdStart = 0, holdSpawnAt = 0;
const pointer = { x: -9999, y: -9999, lastMove: -10, down: null };

// ---------- predator ----------
let predator = null; // {x, y, vx, vy, born, leaving, wiggle}
const PREDATOR_HUNT_S = 8;

function spawnPredator(x, y) {
  predator = {
    x, y, vx: rand(-40, 40), vy: rand(-20, 20),
    born: now, leaving: false, wiggle: 0,
  };
  subSwell();
}

function stepPredator(dt) {
  if (!predator) return;
  const age = now - predator.born;
  if (age > PREDATOR_HUNT_S) predator.leaving = true;
  let ax = 0, ay = 0;
  if (predator.leaving) {
    ay = 70; // sink away
    if (predator.y > H + 80) { predator = null; return; }
  } else {
    // hunt the nearest fish — fast enough to terrify, never enough to catch
    let best = null, bestD = Infinity;
    for (const b of school) {
      const d = Math.hypot(b.x - predator.x, b.y - predator.y);
      if (d < bestD) { bestD = d; best = b; }
    }
    if (best) {
      ax = ((best.x - predator.x) / (bestD || 1)) * 320;
      ay = ((best.y - predator.y) / (bestD || 1)) * 320;
    }
    // soft walls for the hunter too
    const m = 60;
    if (predator.x < m) ax += 300; if (predator.x > W - m) ax -= 300;
    if (predator.y < m) ay += 300; if (predator.y > H - m) ay -= 300;
  }
  const v = predator.leaving
    ? { x: predator.vx * 0.985, y: predator.vy + ay * dt }
    : clampSpeed({ x: predator.vx + ax * dt, y: predator.vy + ay * dt }, 40, WEIGHTS.maxSpeed * 0.86);
  predator.vx = v.x; predator.vy = v.y;
  predator.x += v.x * dt; predator.y += v.y * dt;
  predator.wiggle += dt * (5 + Math.hypot(v.x, v.y) * 0.06);
}

// ---------- god-rays ----------
let rays = [];
function makeRays() {
  rays = [];
  const n = Math.max(4, Math.round(W / 260));
  for (let i = 0; i < n; i++) {
    rays.push({
      x: (i + 0.5) * (W / n) + rand(-40, 40),
      w: rand(50, 130),
      lean: rand(-0.22, 0.22),
      ph: rand(0, TAU),
      sway: rand(0.05, 0.16),
      a: rand(0.06, 0.13),
    });
  }
}
function drawRays(t) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const r of rays) {
    const sway = Math.sin(t * r.sway + r.ph) * 60;
    const topX = r.x + sway * 0.3;
    const botX = r.x + r.lean * H + sway;
    const reach = H * 0.86;
    const breathe = r.a * (0.7 + 0.3 * Math.sin(t * 0.23 + r.ph * 2));
    const g = ctx.createLinearGradient(topX, 0, botX, reach);
    g.addColorStop(0, `rgba(140,235,215,${breathe})`);
    g.addColorStop(0.55, `rgba(90,200,190,${breathe * 0.45})`);
    g.addColorStop(1, 'rgba(60,160,160,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(topX - r.w * 0.32, -4);
    ctx.lineTo(topX + r.w * 0.32, -4);
    ctx.lineTo(botX + r.w * 0.85, reach);
    ctx.lineTo(botX - r.w * 0.85, reach);
    ctx.closePath();
    ctx.fill();
  }
  // shimmering surface light
  const surf = ctx.createLinearGradient(0, 0, 0, H * 0.16);
  const sa = 0.10 + 0.035 * Math.sin(t * 0.4);
  surf.addColorStop(0, `rgba(150,240,220,${sa})`);
  surf.addColorStop(1, 'rgba(150,240,220,0)');
  ctx.fillStyle = surf;
  ctx.fillRect(0, 0, W, H * 0.16);
  ctx.restore();
}

function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H * 0.42, Math.min(W, H) * 0.38, W / 2, H * 0.5, Math.max(W, H) * 0.75);
  g.addColorStop(0, 'rgba(0,4,6,0)');
  g.addColorStop(1, 'rgba(0,3,5,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ---------- bubbles ----------
const bubbles = [];
function stepBubbles(t, dt) {
  if (bubbles.length < 26 && Math.random() < 0.1) {
    bubbles.push({
      x: rand(0, W), y: H + 8, r: rand(1, 3.4),
      vy: rand(18, 42), ph: rand(0, TAU), sw: rand(0.6, 1.6),
    });
  }
  ctx.strokeStyle = 'rgba(170,230,225,0.35)';
  ctx.lineWidth = 1;
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y -= b.vy * dt;
    b.x += Math.sin(t * b.sw + b.ph) * 12 * dt;
    if (b.y < -10) { bubbles.splice(i, 1); continue; }
    ctx.globalAlpha = clamp(b.y / H + 0.25, 0.15, 0.6);
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ---------- sparkles (eating) ----------
const sparkles = [];
function spawnSparkle(x, y) {
  for (let i = 0; i < 5; i++) {
    const a = rand(0, TAU), sp = rand(10, 45);
    sparkles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, born: now, life: rand(0.3, 0.7) });
  }
}
function drawSparkles(t, dt) {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    const f = (t - s.born) / s.life;
    if (f >= 1) { sparkles.splice(i, 1); continue; }
    s.x += s.vx * dt; s.y += s.vy * dt;
    ctx.globalAlpha = 1 - f;
    ctx.fillStyle = '#ffe9b8';
    ctx.beginPath(); ctx.arc(s.x, s.y, 1.3, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- drawing the cast ----------
function drawFish(b, t) {
  const ang = Math.atan2(b.vy, b.vx);
  const speed = Math.hypot(b.vx, b.vy);
  const tail = Math.sin(b.wiggle) * (1.6 + speed * 0.014);
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(ang);
  const size = 0.82 + ((b.hue - 160) / 45) * 0.5; // deterministic per-fish variance
  ctx.scale(size, size);
  const L = 13, half = 3.1;
  // glow
  ctx.shadowColor = `hsla(${b.hue}, 90%, 70%, 0.85)`;
  ctx.shadowBlur = 9;
  // chevron body: nose, swept-back wings, wiggling tail
  ctx.fillStyle = `hsla(${b.hue}, 75%, 68%, 0.95)`;
  ctx.beginPath();
  ctx.moveTo(L * 0.55, 0);                              // nose
  ctx.quadraticCurveTo(0, -half, -L * 0.45, -half * 0.6 + tail * 0.4);
  ctx.lineTo(-L * 0.78, tail);                          // tail tip
  ctx.lineTo(-L * 0.45, half * 0.6 + tail * 0.4);
  ctx.quadraticCurveTo(0, half, L * 0.55, 0);
  ctx.closePath();
  ctx.fill();
  // bright spine
  ctx.shadowBlur = 0;
  ctx.strokeStyle = `hsla(${b.hue + 12}, 95%, 86%, 0.8)`;
  ctx.lineWidth = 0.9;
  ctx.beginPath();
  ctx.moveTo(L * 0.5, 0);
  ctx.quadraticCurveTo(-L * 0.2, tail * 0.3, -L * 0.74, tail);
  ctx.stroke();
  ctx.restore();
}

function drawPredator(t) {
  if (!predator) return;
  const p = predator;
  const age = now - p.born;
  const fade = p.leaving ? clamp(1 - (p.y - (H - 60)) / 140, 0, 1) : clamp(age * 2, 0, 1);
  const ang = Math.atan2(p.vy, p.vx);
  const tail = Math.sin(p.wiggle) * 4.5;
  ctx.save();
  ctx.globalAlpha = fade;
  ctx.translate(p.x, p.y);
  ctx.rotate(ang);
  const L = 40, half = 9;
  ctx.shadowColor = 'rgba(20,40,45,0.9)';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#0d1f24';
  ctx.beginPath();
  ctx.moveTo(L * 0.6, 0);
  ctx.quadraticCurveTo(L * 0.1, -half, -L * 0.4, -half * 0.55 + tail * 0.4);
  ctx.lineTo(-L * 0.8, tail);
  ctx.lineTo(-L * 0.4, half * 0.55 + tail * 0.4);
  ctx.quadraticCurveTo(L * 0.1, half, L * 0.6, 0);
  ctx.closePath();
  ctx.fill();
  // dorsal ridge
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(60,95,100,0.55)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(L * 0.5, 0);
  ctx.quadraticCurveTo(-L * 0.15, tail * 0.3, -L * 0.75, tail);
  ctx.stroke();
  // the red eye
  ctx.fillStyle = '#ff2b3a';
  ctx.shadowColor = '#ff2b3a';
  ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(L * 0.34, -2.2, 2.4, 0, TAU); ctx.fill();
  ctx.restore();
}

function drawFood(t) {
  for (const f of food) {
    const pulse = 0.75 + 0.25 * Math.sin(t * 5 + f.x);
    ctx.fillStyle = `rgba(255,214,140,${0.8 * pulse})`;
    ctx.shadowColor = 'rgba(255,200,120,0.9)';
    ctx.shadowBlur = 7;
    ctx.beginPath(); ctx.arc(f.x, f.y, 2.1, 0, TAU); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ---------- audio ----------
let AC = null, bus = null, muted = false;

function audioInit() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  bus = AC.createGain(); bus.gain.value = muted ? 0 : 0.55;
  bus.connect(AC.destination);
  // underwater pad: filtered brown-ish noise + slow detuned sines
  const len = AC.sampleRate * 2;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const data = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    last = (last + (Math.random() * 2 - 1) * 0.02) * 0.998;
    data[i] = last * 3.5;
  }
  const noise = AC.createBufferSource(); noise.buffer = buf; noise.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 220; lp.Q.value = 0.7;
  const nGain = AC.createGain(); nGain.gain.value = 0.5;
  noise.connect(lp); lp.connect(nGain); nGain.connect(bus); noise.start();
  const padG = AC.createGain(); padG.gain.value = 0.05;
  for (const [f, det] of [[55, -5], [82.4, 4], [110, 0]]) {
    const o = AC.createOscillator(); o.type = 'sine';
    o.frequency.value = f; o.detune.value = det;
    o.connect(padG); o.start();
  }
  padG.connect(bus);
  const lfo = AC.createOscillator(); lfo.frequency.value = 0.06;
  const lfoG = AC.createGain(); lfoG.gain.value = 110;
  lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();
}

function plink() {
  if (!AC || muted) return;
  const t0 = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'sine';
  o.frequency.value = 660 * Math.pow(2, ((Math.random() * 5) | 0) * 3 / 12);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.07, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.35);
  o.connect(g); g.connect(bus);
  o.start(t0); o.stop(t0 + 0.4);
}

function subSwell() {
  if (!AC) return;
  const t0 = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(34, t0);
  o.frequency.exponentialRampToValueAtTime(52, t0 + 1.6);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.22, t0 + 0.9);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3);
  o.connect(g); g.connect(bus);
  o.start(t0); o.stop(t0 + 3.1);
}

// ---------- toast ----------
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.style.opacity = 0, 1800);
}

// ---------- input ----------
let interacted = false;
function firstGesture() {
  audioInit();
  if (AC && AC.state === 'suspended') AC.resume();
  if (!interacted) { interacted = true; document.getElementById('ui').classList.add('hidden'); }
}

canvas.addEventListener('pointermove', e => {
  pointer.x = e.clientX; pointer.y = e.clientY; pointer.lastMove = now;
});
canvas.addEventListener('pointerdown', e => {
  firstGesture();
  pointer.x = e.clientX; pointer.y = e.clientY;
  pointer.down = { x: e.clientX, y: e.clientY, t: now };
  holding = true; holdStart = now; holdSpawnAt = now + 0.22;
});
window.addEventListener('pointerup', e => {
  holding = false;
  const d = pointer.down;
  pointer.down = null;
  if (!d) return;
  const moved = Math.hypot(e.clientX - d.x, e.clientY - d.y);
  if (now - d.t < 0.25 && moved < 10 && !predator) {
    spawnPredator(d.x, d.y);
  }
});
window.addEventListener('pointercancel', () => { holding = false; pointer.down = null; });

window.addEventListener('keydown', e => {
  if (e.key === 'm') {
    muted = !muted;
    if (bus) bus.gain.value = muted ? 0 : 0.55;
    toast(muted ? 'muted' : 'sound on');
  } else if (e.key === '+' || e.key === '=') {
    setSchoolSize(school.length + 10);
  } else if (e.key === '-' || e.key === '_') {
    setSchoolSize(school.length - 10);
  }
});

// ---------- simulation ----------
function stepFood(dt) {
  // while holding (past the tap window), food sinks from the pointer
  if (holding && now > holdSpawnAt && now - holdStart > 0.25) {
    food.push({
      x: pointer.x + rand(-6, 6), y: pointer.y + rand(-4, 4),
      vy: rand(12, 26), drift: rand(-8, 8), born: now,
    });
    holdSpawnAt = now + 0.12;
  }
  for (let i = food.length - 1; i >= 0; i--) {
    const f = food[i];
    f.y += f.vy * dt;
    f.x += f.drift * dt;
    if (f.y > H - 6 || now - f.born > 25) { food.splice(i, 1); continue; }
    // eaten?
    for (const b of school) {
      if (Math.hypot(b.x - f.x, b.y - f.y) < 7) {
        food.splice(i, 1);
        spawnSparkle(f.x, f.y);
        plink();
        break;
      }
    }
  }
}

function stepSchool(dt) {
  const env = {
    food,
    predator: predator && !predator.leaving ? { x: predator.x, y: predator.y } : null,
    pointer: now - pointer.lastMove < 2.5 ? { x: pointer.x, y: pointer.y } : null,
    bounds: { w: W, h: H },
  };
  // feeding loosens the school
  let w = WEIGHTS;
  if (food.length) w = { ...WEIGHTS, cohesion: WEIGHTS.cohesion * 0.35, alignment: WEIGHTS.alignment * 0.5 };
  const R = WEIGHTS.neighborRadius;
  const next = new Array(school.length);
  for (let i = 0; i < school.length; i++) {
    const b = school[i];
    const neighbors = [];
    for (let j = 0; j < school.length; j++) {
      if (j === i) continue;
      const o = school[j];
      const dx = o.x - b.x, dy = o.y - b.y;
      if (dx * dx + dy * dy < R * R) neighbors.push(o);
    }
    next[i] = stepBoid(b, neighbors, env, w, dt);
  }
  school = next;
}

// ---------- main loop ----------
let now = 0, last = 0;
function frame(ms) {
  now = ms / 1000;
  const dt = Math.min(0.05, now - last || 0.016);
  last = now;

  // water
  const water = ctx.createLinearGradient(0, 0, 0, H);
  water.addColorStop(0, '#03252b');
  water.addColorStop(0.35, '#02191f');
  water.addColorStop(0.75, '#010d12');
  water.addColorStop(1, '#01070a');
  ctx.fillStyle = water;
  ctx.fillRect(0, 0, W, H);

  drawRays(now);

  stepFood(dt);
  stepSchool(dt);
  stepPredator(dt);

  drawFood(now);
  for (const b of school) drawFish(b, now);
  drawPredator(now);
  drawSparkles(now, dt);
  stepBubbles(now, dt);
  drawVignette();

  requestAnimationFrame(frame);
}

// read-only handle for the headless acceptance run
globalThis.__lagoon = {
  get fishCount() { return school.length; },
  get foodCount() { return food.length; },
  get hasPredator() { return predator !== null; },
};

resize();
spawnFish(60);
requestAnimationFrame(frame);
</script>
</body>
</html>
